server:
  port: 8082

spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/marketplace}
    elasticsearch:
      repositories:
        enabled: true
  graphql:
    graphiql:
      enabled: true
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
